<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Intelligence — GioSound</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #06060a; --bg2: #0c0c14; --bg3: #14141f; --bg4: #1c1c2a;
  --text: #e8e8f0; --text2: #8888a8; --text3: #555570;
  --accent: #ff3366; --accent2: #ff6699;
  --green: #00cc88; --green-bg: rgba(0,204,136,0.1);
  --orange: #ff9500; --orange-bg: rgba(255,149,0,0.1);
  --red: #ff2244; --red-bg: rgba(255,34,68,0.1);
  --blue: #4488ff; --blue-bg: rgba(68,136,255,0.1);
  --purple: #aa66ff; --purple-bg: rgba(170,102,255,0.1);
  --yellow: #ffcc00; --yellow-bg: rgba(255,204,0,0.08);
  --border: #1a1a2e; --border2: #252540;
  --glass: rgba(255,255,255,0.02);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }

/* ══ LAYOUT ══ */
.app { display:grid; grid-template-columns:56px 260px 1fr; grid-template-rows:1fr; height:100vh; }

/* ── Rail (left icon strip) ── */
.rail {
  background:var(--bg); border-right:1px solid var(--border); display:flex;
  flex-direction:column; align-items:center; padding:16px 0; gap:4px; z-index:100;
}
.rail-logo { width:32px; height:32px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; color:#fff; margin-bottom:16px; cursor:pointer; }
.rail-btn {
  width:40px; height:40px; border-radius:10px; border:none; background:transparent;
  color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:18px; transition:all 0.15s; position:relative;
}
.rail-btn:hover { background:var(--bg3); color:var(--text2); }
.rail-btn.active { background:var(--bg3); color:var(--accent); }
.rail-btn .dot { position:absolute; top:8px; right:8px; width:6px; height:6px; border-radius:50%; background:var(--accent); }
.rail-spacer { flex:1; }
.rail-avatar { width:32px; height:32px; border-radius:50%; background:var(--bg4); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text2); cursor:pointer; }

/* ── Sidebar ── */
.sidebar {
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-header { padding:20px 16px 12px; border-bottom:1px solid var(--border); }
.sidebar-title { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; }
.sidebar-mode { font-size:20px; font-weight:800; margin-top:4px; }
.sidebar-scroll { flex:1; overflow-y:auto; padding:8px; }

.sidebar-section { margin-bottom:16px; }
.sidebar-section-title { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; padding:8px 8px 4px; }

.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px;
  cursor:pointer; transition:all 0.12s; font-size:13px; color:var(--text2);
}
.sidebar-item:hover { background:var(--bg3); color:var(--text); }
.sidebar-item.active { background:var(--bg3); color:var(--text); }
.sidebar-item .icon { font-size:16px; width:20px; text-align:center; }
.sidebar-item .badge { margin-left:auto; font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px; }

/* ── Main Content ── */
.main { display:flex; flex-direction:column; overflow:hidden; }
.main-header {
  padding:16px 32px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px; flex-shrink:0;
  background:var(--bg2);
}
.main-header h2 { font-size:16px; font-weight:700; }
.main-header .view-toggle {
  margin-left:auto; display:flex; gap:2px; background:var(--bg); border-radius:8px; padding:2px;
}
.view-toggle button {
  padding:6px 14px; font-size:11px; font-weight:600; border:none; border-radius:6px;
  background:transparent; color:var(--text2); cursor:pointer; transition:all 0.15s;
}
.view-toggle button.active { background:var(--bg3); color:var(--text); }
.view-toggle button:hover { color:var(--text); }

.main-scroll { flex:1; overflow-y:auto; }

/* ── Panels ── */
.panel { display:none; padding:32px; }
.panel.active { display:block; }

/* ── Producer Console specific ── */
.console-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
.console-card {
  background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:20px;
  transition:border-color 0.2s;
}
.console-card:hover { border-color:var(--border2); }
.console-card .card-label { font-size:10px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
.console-card .card-value { font-size:28px; font-weight:900; line-height:1; }
.console-card .card-detail { font-size:12px; color:var(--text2); margin-top:6px; }

/* Input fields */
.input-group { margin-bottom:16px; }
.input-label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block; }
.input-field {
  width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'Inter'; font-size:13px;
  outline:none; transition:border-color 0.2s;
}
.input-field:focus { border-color:var(--accent); }
.input-field::placeholder { color:var(--text3); }
textarea.input-field { resize:vertical; min-height:80px; }
select.input-field { cursor:pointer; }

.btn {
  padding:10px 20px; border-radius:8px; border:none; font-family:'Inter';
  font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--text2); color:var(--text); }

/* Chapter rows in producer view */
.ch-row {
  display:grid; grid-template-columns:40px 1fr 100px 80px 60px 1fr;
  gap:12px; align-items:center; padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.03); font-size:13px;
  transition:background 0.1s;
}
.ch-row:hover { background:var(--glass); }
.ch-row-header { position:sticky; top:0; background:var(--bg2); z-index:5; font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.ch-num { font-family:'JetBrains Mono'; font-size:12px; color:var(--text3); }
.ch-name { font-weight:600; }
.ch-action { font-size:12px; color:var(--text2); }

.pill { display:inline-block; font-size:10px; font-weight:700; padding:3px 10px; border-radius:10px; text-transform:uppercase; letter-spacing:0.5px; }
.p-clean { background:var(--green-bg); color:var(--green); }
.p-spot { background:var(--orange-bg); color:var(--orange); }
.p-rework { background:var(--red-bg); color:var(--red); }
.p-critical { background:var(--red-bg); color:var(--red); animation:pulse 2s infinite; }
.p-confirm { background:var(--blue-bg); color:var(--blue); }
.p-rebuild { background:var(--purple-bg); color:var(--purple); }

@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

.pct-bar { display:flex; align-items:center; gap:6px; }
.pct-track { width:50px; height:4px; background:var(--bg); border-radius:2px; overflow:hidden; }
.pct-fill { height:100%; border-radius:2px; }
.pct-num { font-family:'JetBrains Mono'; font-size:11px; }

/* ── Client View ── */
.client-hero {
  background:linear-gradient(135deg, var(--bg3) 0%, #0a1020 100%);
  border-radius:16px; padding:40px; margin-bottom:24px;
  border:1px solid var(--border);
}
.client-hero h1 { font-size:32px; font-weight:900; margin-bottom:4px; }
.client-hero .sub { font-size:14px; color:var(--text2); margin-bottom:24px; }
.client-stats { display:flex; gap:32px; }
.client-stat .num { font-size:36px; font-weight:900; }
.client-stat .label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; }

.client-chapter-list { margin-top:8px; }
.client-ch {
  display:flex; align-items:center; gap:16px; padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.client-ch-name { font-weight:600; min-width:140px; }
.client-ch-bar { flex:1; height:8px; background:var(--bg3); border-radius:4px; overflow:hidden; }
.client-ch-fill { height:100%; border-radius:4px; transition:width 0.5s; }
.client-ch-status { min-width:100px; text-align:right; }

/* ── Vendor/Input Panel ── */
.input-panel {
  background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  padding:24px; margin-bottom:16px;
}
.input-panel h3 { font-size:14px; font-weight:700; margin-bottom:16px; }

/* ── Dataset view ── */
.dataset-block {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:16px; font-family:'JetBrains Mono'; font-size:11px; color:var(--text2);
  overflow-x:auto; max-height:400px; overflow-y:auto; white-space:pre-wrap;
  line-height:1.6;
}

/* ── Timeline mini ── */
.tl-mini { padding:0; list-style:none; }
.tl-mini li {
  position:relative; padding:8px 0 8px 24px; border-left:2px solid var(--border);
  font-size:13px; margin-left:8px;
}
.tl-mini li::before {
  content:''; position:absolute; left:-5px; top:12px;
  width:8px; height:8px; border-radius:50%; background:var(--accent); border:2px solid var(--bg);
}
.tl-mini .tl-date { font-family:'JetBrains Mono'; font-size:11px; color:var(--accent); }
.tl-mini .tl-text { color:var(--text2); margin-top:2px; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="app">

<!-- ══ RAIL ══ -->
<div class="rail">
  <div class="rail-logo">G</div>
  <button class="rail-btn active" onclick="switchMode('producer')" title="Producer Console">&#9881;</button>
  <button class="rail-btn" onclick="switchMode('client')" title="Client View">&#9671;</button>
  <button class="rail-btn" onclick="switchMode('vendor')" title="Vendor Input">&#8644;</button>
  <button class="rail-btn" onclick="switchMode('dataset')" title="Raw Dataset">&#9636;</button>
  <div class="rail-spacer"></div>
  <button class="rail-btn" title="Intelligence"><span class="dot"></span>&#9733;</button>
  <div class="rail-avatar">GB</div>
</div>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar" id="sidebar">
  <!-- Populated by JS based on mode -->
</div>

<!-- ══ MAIN ══ -->
<div class="main">
  <div class="main-header" id="mainHeader">
    <!-- Populated by JS -->
  </div>
  <div class="main-scroll" id="mainContent">
    <!-- Populated by JS -->
  </div>
</div>

</div>

// ══ Computed stats ══
const stats = {
  total: DATASET.chapters.length,
  clean: DATASET.chapters.filter(c=>c.cls==='clean').length,
  spot: DATASET.chapters.filter(c=>c.cls==='spot').length,
  rework: DATASET.chapters.filter(c=>['rework','critical'].includes(c.cls)).length,
  confirm: DATASET.chapters.filter(c=>['confirm','rebuild'].includes(c.cls)).length,
  totalAI: DATASET.chapters.reduce((s,c)=>s+c.files,0),
  pendingDecisions: DATASET.decisions.filter(d=>d.status==='pending').length,
};

// ══ Pill helpers ══
function pillClass(cls) {
  const map = {clean:'p-clean',spot:'p-spot',rework:'p-rework',critical:'p-critical',confirm:'p-confirm',rebuild:'p-rebuild'};
  return map[cls]||'p-clean';
}
function barColor(cls) {
  const map = {clean:'var(--green)',spot:'var(--orange)',rework:'var(--red)',critical:'var(--red)',confirm:'var(--blue)',rebuild:'var(--purple)'};
  return map[cls]||'var(--green)';
}

// ══════════════════════════════════════════════════════
// RENDER FUNCTIONS — Different views of same data
// ══════════════════════════════════════════════════════

function switchMode(mode) {
  document.querySelectorAll('.rail-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['producer','client','vendor','dataset'][i]===mode);
  });
  const renderers = {producer:renderProducer, client:renderClient, vendor:renderVendor, dataset:renderDataset};
  if(renderers[mode]) renderers[mode]();
}

// ── PRODUCER CONSOLE ──
function renderProducer() {
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-header">
      <div class="sidebar-title">Producer Console</div>
      <div class="sidebar-mode">GioSound</div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Project</div>
        <div class="sidebar-item active" onclick="showProducerPanel('overview')"><span class="icon">&#9673;</span> Overview</div>
        <div class="sidebar-item" onclick="showProducerPanel('chapters')"><span class="icon">&#9776;</span> Chapters <span class="badge" style="background:var(--red-bg);color:var(--red);">${stats.rework}</span></div>
        <div class="sidebar-item" onclick="showProducerPanel('timeline')"><span class="icon">&#8986;</span> Timeline</div>
        <div class="sidebar-item" onclick="showProducerPanel('decisions')"><span class="icon">&#9888;</span> Decisions <span class="badge" style="background:var(--orange-bg);color:var(--orange);">${stats.pendingDecisions}</span></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Intelligence</div>
        <div class="sidebar-item" onclick="showProducerPanel('standards')"><span class="icon">&#9733;</span> Standards</div>
        <div class="sidebar-item" onclick="showProducerPanel('team')"><span class="icon">&#9787;</span> Team</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Deadlines</div>
        ${DATASET.deadlines.map(d=>`
          <div class="sidebar-item" style="font-size:12px;">
            <span style="font-family:'JetBrains Mono';color:${d.status==='critical'?'var(--red)':'var(--accent)'};font-size:11px;">${d.date}</span>
            <span style="color:var(--text2);">${d.event.split('(')[0].trim()}</span>
          </div>
        `).join('')}
      </div>
    </div>`;

  document.getElementById('mainHeader').innerHTML = `
    <h2>${DATASET.project.title}</h2>
    <span style="font-size:12px;color:var(--text2);">${DATASET.project.publisher} &bull; ${DATASET.project.release}</span>
    <div class="view-toggle">
      <button class="active" onclick="showProducerPanel('overview')">Overview</button>
      <button onclick="showProducerPanel('chapters')">Chapters</button>

function showProducerPanel(panel) {

function showClientPanel(panel) {
  const el = document.getElementById('mainContent');
  const readyCount = DATASET.chapters.filter(c=>c.pct===0).length;
  const progressPct = Math.round((readyCount/stats.total)*100);

  if(panel==='status') {
    el.innerHTML = `<div style="padding:32px;">
      <div class="client-hero">
        <h1>${DATASET.project.title}</h1>
        <div class="sub">${DATASET.project.subtitle} — by ${DATASET.project.author}</div>
        <div class="client-stats">
          <div class="client-stat"><div class="num" style="color:var(--green);">${progressPct}%</div><div class="label">Complete</div></div>
          <div class="client-stat"><div class="num">${readyCount}</div><div class="label">Chapters Ready</div></div>
          <div class="client-stat"><div class="num">${stats.total - readyCount}</div><div class="label">In Progress</div></div>
          <div class="client-stat"><div class="num" style="color:var(--accent);">Apr 15</div><div class="label">Compliance Date</div></div>
        </div>
      </div>
      <h3 style="font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;">Upcoming Milestones</h3>
      ${DATASET.deadlines.map(d=>`
        <div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;">
          <span style="font-family:'JetBrains Mono';font-size:13px;color:${d.status==='critical'?'var(--red)':'var(--blue)'};min-width:70px;font-weight:600;">${d.date}</span>
          <span style="font-size:13px;">${d.event}</span>
        </div>
      `).join('')}
    </div>`;
  }
  else if(panel==='chapters') {
    el.innerHTML = `<div style="padding:32px;">
      <div class="client-chapter-list">
        ${DATASET.chapters.map(c=>{
          const pct = c.pct===0 ? 100 : Math.max(100-c.pct*5, 10);
          const color = c.pct===0 ? 'var(--green)' : c.pct<5 ? 'var(--orange)' : 'var(--red)';
          const label = c.pct===0 ? 'Ready' : 'In Progress';
          return `<div class="client-ch">
            <span class="client-ch-name">${c.name}</span>
            <div class="client-ch-bar"><div class="client-ch-fill" style="width:${pct}%;background:${color};"></div></div>
            <span class="client-ch-status"><span class="pill" style="background:${c.pct===0?'var(--green-bg)':'var(--orange-bg)'};color:${c.pct===0?'var(--green)':'var(--orange)'};">${label}</span></span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  else if(panel==='milestones') {
    el.innerHTML = `<div style="padding:32px;">
      <ul class="tl-mini">
        ${DATASET.deadlines.map(d=>`<li><div class="tl-date">${d.date}</div><div class="tl-text">${d.event}</div></li>`).join('')}
      </ul>
    </div>`;
  }
}
